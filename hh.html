<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <title>Angkor</title>
    <link rel="icon" type="image/x-icon" href="angkorwat.png">
</head>
   <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            text-align: center;
            background: #fff;
        }
        .banner {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .logo-section {
            text-align: center;
            padding: 20px 0;
        }
        .logo-section img {
            width: 80px;
        }
        nav {
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            color: #d4a017;
            text-decoration: none;
            font-weight: bold;
        }
        h1, h2 {
            color: #8b0000;
            border-bottom: 2px solid #d4a017;
            padding-bottom: 10px;
        }
        .temple-block {
            margin-bottom: 40px;
        }
        .temple-block img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin: 15px 0;
        }
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            background: #333;
            color: #fff;
            margin-top: 20px;
        }
    </style>
</head>
